<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spawn Route Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Wild West Spawn Route Guide</h1>
</header>

<!-- role tiles etc… -->

<script src="logic.js"></script>
</body>
</html>

<!-- WAVES SHOWN AFTER ROLE SELECT -->
<div class="wave-container hidden" id="waveContainer"></div>

<!-- MAP -->
<div class="map">

    <div class="zone" id="foundry">
        <h2>Foundry</h2>
        <div class="spot" id="foundry_left">Left</div>
        <div class="spot" id="foundry_mid">Middle</div>
        <div class="spot" id="foundry_right">Right</div>
    </div>

    <div class="zone" id="keep">
        <h2>Keep</h2>
        <div class="spot" id="keep_left">Left</div>
        <div class="spot" id="keep_mid">Middle</div>
        <div class="spot" id="keep_right">Right</div>
    </div>

    <div class="zone" id="garden">
        <h2>Burnt Garden</h2>
        <div class="spot" id="garden_left">Left</div>
        <div class="spot" id="garden_mid">Middle</div>
        <div class="spot" id="garden_right">Right</div>
    </div>

</div>

<div id="resultPanel"></div>

<script src="logic.js"></script>
</body>
</html>
