<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

</head>

<body>

<header>

</header>

<!-- ✅ GLOBAL TOP NAV BAR (H1 STYLE — horizontal role buttons) -->
<div class="top-bar">
    <button class="top-btn" onclick="switchRole('g1_archer')">G1 Archer</button>
    <button class="top-btn" onclick="switchRole('g1_non')">G1 Non-Archer</button>
    <button class="top-btn" onclick="switchRole('g2_archer')">G2 Archer</button>
    <button class="top-btn" onclick="switchRole('g2_non')">G2 Non-Archer</button>
    <a class="top-btn" href="overview.html">Overview</a>
</div>

<!-- ✅ WAVE BUTTON BAR (horizontal) -->
<div class="wave-bar">

    <button class="wave-btn" onclick="showWave(3, 2, currentRole)">Wave 2</button>
    <button class="wave-btn" onclick="showWave(3, 3, currentRole)">Wave 3</button>

<div id="waveOutput" class="wave-output"></div>

<!-- ✅ NEXT STAGE BUTTON -->
<a id="nextStage" class="next-btn">Next Stage →</a>

<!-- ✅ PREVIOUS PAGE BUTTON -->

<!-- ✅ RETURN HOME BUTTON -->

<!-- ✅ JAVASCRIPT -->
<script src="logic.js"></script>

    // Initialize Stage 3 and apply role stored in ?role=
    initializeStage(3);
</script>
