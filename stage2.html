<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stage 2 – Broken Castle Nightmare Survival</title>
    <link rel="stylesheet" href="style.css">
    <script src="logic.js" defer></script>
</head>
<body>

<header><h1>Stage 2</h1></header>

<div id="waveContainer" class="wave-container"></div>

<div class="map">
    <div class="zone">
        <h2>Foundry</h2>
        <div class="spot" id="foundry_left">Left</div>
        <div class="spot" id="foundry_mid">Middle</div>
        <div class="spot" id="foundry_right">Right</div>
    </div>

    <div class="zone">
        <h2>Keep</h2>
        <div class="spot" id="keep_left">Left</div>
        <div class="spot" id="keep_mid">Middle</div>
        <div class="spot" id="keep_right">Right</div>
    </div>

    <div class="zone">
        <h2>Burnt Garden</h2>
        <div class="spot" id="garden_left">Left</div>
        <div class="spot" id="garden_mid">Middle</div>
        <div class="spot" id="garden_right">Right</div>
    </div>
</div>

<div id="resultPanel"></div>

<a id="nextStage" class="next-btn">Next Stage →</a>

</body>
</html>
