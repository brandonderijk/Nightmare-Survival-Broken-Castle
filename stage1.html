<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stage 1 – Broken Castle Nightmare Survival</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
    <h1>Stage 1</h1>
</header>

<!-- GLOBAL ROLE SWITCH BAR (H1 Style, Horizontal Buttons) -->
<div class="top-bar">
    <button class="top-btn" onclick="switchRole('g1_archer')">G1 Archer</button>
    <button class="top-btn" onclick="switchRole('g1_non')">G1 Non-Archer</button>
    <button class="top-btn" onclick="switchRole('g2_archer')">G2 Archer</button>
    <button class="top-btn" onclick="switchRole('g2_non')">G2 Non-Archer</button>

    <a class="top-btn overview-btn" href="overview.html">Overview</a>
</div>

<!-- WAVE BUTTON BAR -->
<div class="wave-bar">
    <button class="wave-btn" onclick="showWave(1, 1, currentRole)">Wave 1</button>
    <button class="wave-btn" onclick="showWave(1, 2, currentRole)">Wave 2</button>
    <button class="wave-btn" onclick="showWave(1, 3, currentRole)">Wave 3</button>
</div>

<!-- TILE → ARROW → TILE OUTPUT -->
<div id="waveOutput" class="wave-output"></div>

<!-- NEXT STAGE BUTTON -->
<a id="nextStage" class="next-btn" href="stage2.html">Next Stage →</a>

<!-- RETURN HOME BUTTON -->
<a href="index.html" class="home-btn">← Return to Home</a>

<script src="logic.js"></script>
<script>
    // Initialize Stage 1 and apply role from ?role=
    initializeStage(1);
</script>

</body>
</html>
